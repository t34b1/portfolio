<!DOCTYPE html>
<head>
  <meta charset="UTF-8" />
  <link rel = "stylesheet" href = "../../styles/styles.css">
  <style>
    body {
      background-color: transparent;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }  
    .window {
    position: absolute;
    width: 60%;
    min-height: 60%;
    max-height: 90vh;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.1);
    background: url("../../images/wnrs/wnrs-site-dark.jpg") top center / contain no-repeat;
    background-color: #101010;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-radius: 8px;
    overflow: hidden;
    padding: 2%;
    } 
    .card {
      width: 100%;
      height: auto;
      margin-right: 15%;
    }
    #card-container {
      width: 70%;
      height: auto;
      padding: 0% 8%;
      overflow: hidden;
      width: 70%;
      white-space: nowrap;
    }
    #card-container img {
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="light container"><div class="section ">
    <img class="screensaver" src="https://freight.cargo.site/t/original/i/F2280885902202963869820408493615/desktop.jpg">
    <div class = "window">
      <img src = "../../images/wnrs/back-arrow-red.png" width ="3%" id = "previous">
      <div id = "card-container">
        <img src = "../../images/wnrs/self-exploration-pack-title.png" id = "title">
      </div>
      <img src = "../../images/wnrs/forward-arrow-red.png" width = "3%" id = "next">
    </div>
   </div>
  </div>
     <script type="module" src="../../scripts/main-self-exploration-pack.js"></script>
</body>
</html>
